name: Deploy

on:
  push:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to W7S
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Deploy
        uses: w7s-io/w7s-cloud@v1

      - name: Smoke test producer to consumer queue
        run: |
          set -euo pipefail
          producer="https://w7s-io.w7s.cloud/example-queue-producer"
          consumer="https://w7s-io.w7s.cloud/example-queue-consumer"

          for attempt in {1..12}; do
            if body="$(curl -fsS -X POST "$producer/enqueue?text=producer-consumer-smoke")"; then
              echo "$body"
              id="$(BODY="$body" node - <<'NODE'
          const body = JSON.parse(process.env.BODY);
          if (body.service !== "example-queue-producer") {
            throw new Error(`Unexpected service: ${body.service}`);
          }
          if (body.status !== "queued") {
            throw new Error(`Unexpected enqueue status: ${body.status}`);
          }
          if (!body.id) {
            throw new Error("Missing queued id.");
          }
          process.stdout.write(body.id);
          NODE
              )"
              break
            fi
            sleep 5
          done

          test -n "${id:-}"

          for attempt in {1..18}; do
            status="$(curl -sS -o body.json -w "%{http_code}" "$consumer/messages/$id" || true)"
            cat body.json || true
            echo
            if [ "$status" = "200" ] && BODY="$(cat body.json)" EXPECTED_ID="$id" node - <<'NODE'
          const body = JSON.parse(process.env.BODY);
          const message = body.message?.lastMessage;
          if (message?.body?.id !== process.env.EXPECTED_ID) {
            process.exit(1);
          }
          if (message?.body?.text !== "producer-consumer-smoke") {
            throw new Error("Processed message body did not match the smoke payload.");
          }
          if (message?.caller?.repository !== "w7s-io/example-queue-producer") {
            throw new Error(`Unexpected caller: ${message?.caller?.repository}`);
          }
          NODE
            then
              exit 0
            fi
            sleep 5
          done

          curl -fsS "$consumer/messages/$id"
          exit 1
